# EchoLens v1.0 — local production-like stack.
#   docker compose up --build
# Then the app is at http://localhost (Nginx → backend + static frontend).
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: echolens
      POSTGRES_PASSWORD: echolens
      POSTGRES_DB: echolens
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U echolens"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      ECHOLENS_ENV: production
      ECHOLENS_DB_URL: postgresql://echolens:echolens@db:5432/echolens
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-prod}
      ECHOLENS_LOG_JSON: "1"
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"

  frontend:
    build: ./frontend
    expose:
      - "80"

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
