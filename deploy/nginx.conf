# Reverse proxy: /api/* → backend (prefix stripped), everything else → frontend.
server {
    listen 80;
    server_name _;

    # API — strip the /api prefix and disable buffering so SSE streams live.
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # SSE
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # Static SPA
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
    }
}
