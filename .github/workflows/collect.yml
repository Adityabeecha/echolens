# Free-tier scheduled monitoring for EchoLens.
# Northflank has no free cron; GitHub Actions cron is free. This pings the deployed
# backend every 6 hours to collect new data, scan for anomalies, and triage —
# so the "watch feedback → investigate" loop runs without you.
#
# Setup: in the repo settings → Secrets and variables → Actions, add:
#   ECHOLENS_API   = https://<your-service>.code.run   (no trailing slash)
#   ECHOLENS_EMAIL / ECHOLENS_PASSWORD = a reviewer/admin login (for the token)
name: EchoLens scheduled collect + scan

on:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Check the secrets exist
        env:
          API: ${{ secrets.ECHOLENS_API }}
          EMAIL: ${{ secrets.ECHOLENS_EMAIL }}
          PASSWORD: ${{ secrets.ECHOLENS_PASSWORD }}
        run: |
          missing=""
          [ -n "$API" ]      || missing="$missing ECHOLENS_API"
          [ -n "$EMAIL" ]    || missing="$missing ECHOLENS_EMAIL"
          [ -n "$PASSWORD" ] || missing="$missing ECHOLENS_PASSWORD"
          if [ -n "$missing" ]; then
            echo "::error::Missing repo secret(s):$missing"
            echo "Add them under Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "secrets present; API host = $(echo "$API" | sed -E 's#https?://([^/]+).*#\1#')"

      - name: Wake the service
        env:
          API: ${{ secrets.ECHOLENS_API }}
        # The container stays up, but a redeploy can still be mid-rollout.
        # Poll /health until it answers so the real calls below don't hit a cold
        # start and time out.
        run: |
          for i in $(seq 1 12); do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 "$API/health" || echo 000)
            if [ "$code" = "200" ]; then echo "awake after ${i} attempt(s)"; exit 0; fi
            echo "attempt $i: /health → $code, retrying in 10s"
            sleep 10
          done
          echo "::error::$API/health never returned 200 — check the service in Northflank."
          exit 1

      - name: Log in and run the pipeline for every product
        env:
          API: ${{ secrets.ECHOLENS_API }}
          EMAIL: ${{ secrets.ECHOLENS_EMAIL }}
          PASSWORD: ${{ secrets.ECHOLENS_PASSWORD }}
        run: |
          set -euo pipefail

          body=$(curl -s --max-time 60 -w '\n%{http_code}' -X POST "$API/auth/login" \
            -H "Content-Type: application/json" \
            -d "$(python3 -c 'import json,os;print(json.dumps({"email":os.environ["EMAIL"],"password":os.environ["PASSWORD"]}))')")
          code=$(echo "$body" | tail -n1)
          if [ "$code" != "200" ]; then
            echo "::error::login failed (HTTP $code) — check ECHOLENS_EMAIL / ECHOLENS_PASSWORD"
            exit 1
          fi
          TOKEN=$(echo "$body" | sed '$d' | python3 -c "import sys,json;print(json.load(sys.stdin)['token'])")
          auth="Authorization: Bearer $TOKEN"

          echo "→ collect (all sources)"
          curl -sf --max-time 300 -X POST "$API/collectors/run" -H "$auth" || echo "  collect failed (non-fatal)"

          # Since v8.0 every scan/triage is product-scoped: with no product_id the
          # API falls back to the first product, so a bare call would only ever
          # scan one. Enumerate and run each.
          products=$(curl -sf --max-time 60 "$API/products" -H "$auth" \
            | python3 -c "import sys,json;print(' '.join(str(p['id']) for p in json.load(sys.stdin)['products']))")
          if [ -z "$products" ]; then echo "::warning::no products configured"; fi

          for pid in $products; do
            echo "→ product $pid: scan";   curl -sf --max-time 300 -X POST "$API/anomalies/scan?product_id=$pid" -H "$auth" || echo "  scan failed"
            # run=true actually OPENS cases. Without it this is only a preview —
            # the scheduled job would review anomalies and start nothing.
            echo "→ product $pid: triage"; curl -sf --max-time 300 -X POST "$API/anomalies/triage?run=true&product_id=$pid" -H "$auth" || echo "  triage failed"
          done

          echo "→ digest";   curl -sf --max-time 120 -X POST "$API/alerts/digest?hours=24" -H "$auth" || echo "  digest failed"
          echo "→ fixwatch"; curl -sf --max-time 120 -X POST "$API/fixwatch/evaluate" -H "$auth" || echo "  fixwatch failed"
          echo "done"
