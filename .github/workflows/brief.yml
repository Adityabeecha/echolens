# Weekly brief (v7.0). Sends EchoLens's Monday-morning brief to Slack/email
# unprompted. Uses the same secrets as the collector workflow.
name: EchoLens weekly brief

on:
  schedule:
    - cron: "0 13 * * 1" # Mondays 13:00 UTC
  workflow_dispatch: {}

jobs:
  brief:
    runs-on: ubuntu-latest
    steps:
      - name: Log in and send the weekly brief
        env:
          API: ${{ secrets.ECHOLENS_API }}
          EMAIL: ${{ secrets.ECHOLENS_EMAIL }}
          PASSWORD: ${{ secrets.ECHOLENS_PASSWORD }}
        run: |
          set -euo pipefail
          missing=""
          [ -n "$API" ]      || missing="$missing ECHOLENS_API"
          [ -n "$EMAIL" ]    || missing="$missing ECHOLENS_EMAIL"
          [ -n "$PASSWORD" ] || missing="$missing ECHOLENS_PASSWORD"
          if [ -n "$missing" ]; then
            echo "::error::Missing repo secret(s):$missing"; exit 1
          fi

          # Confirm the API is answering before the real call.
          for i in $(seq 1 12); do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 "$API/health" || echo 000)
            [ "$code" = "200" ] && break
            echo "waking: attempt $i → $code"; sleep 10
          done

          body=$(curl -s --max-time 60 -w '\n%{http_code}' -X POST "$API/auth/login" \
            -H "Content-Type: application/json" \
            -d "$(python3 -c 'import json,os;print(json.dumps({"email":os.environ["EMAIL"],"password":os.environ["PASSWORD"]}))')")
          code=$(echo "$body" | tail -n1)
          if [ "$code" != "200" ]; then
            echo "::error::login failed (HTTP $code) — check ECHOLENS_EMAIL / ECHOLENS_PASSWORD"; exit 1
          fi
          TOKEN=$(echo "$body" | sed '$d' | python3 -c "import sys,json;print(json.load(sys.stdin)['token'])")

          echo "→ brief"; curl -sf --max-time 120 -X POST "$API/brief/send" -H "Authorization: Bearer $TOKEN"
          echo "done"
